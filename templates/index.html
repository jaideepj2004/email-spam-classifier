<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <i class="fas fa-envelope-open-text"></i>
                <h1>Email Spam Classifier</h1>
                <p class="subtitle">AI-Powered Email Detection System</p>
            </div>
        </header>

        <main>
            <div class="input-section">
                <div class="section-header">
                    <i class="fas fa-edit"></i>
                    <h2>Enter Email Content</h2>
                </div>
                <textarea 
                    id="emailInput" 
                    placeholder="Paste your email content here...&#10;&#10;Example:&#10;Congratulations! You've won $1,000,000! Click here to claim now!"
                    rows="10"
                ></textarea>
                
                <div class="button-group">
                    <button id="classifyBtn" class="btn btn-primary">
                        <i class="fas fa-check-circle"></i>
                        Classify Email
                    </button>
                    <button id="clearBtn" class="btn btn-secondary">
                        <i class="fas fa-trash"></i>
                        Clear
                    </button>
                </div>

                <div class="quick-examples">
                    <p><strong>Quick Examples:</strong></p>
                    <div class="example-buttons">
                        <button class="example-btn" data-type="spam">
                            <i class="fas fa-exclamation-triangle"></i> Spam Example
                        </button>
                        <button class="example-btn" data-type="ham">
                            <i class="fas fa-envelope"></i> Legitimate Example
                        </button>
                    </div>
                </div>
            </div>

            <div id="resultSection" class="result-section hidden">
                <div class="section-header">
                    <i class="fas fa-chart-bar"></i>
                    <h2>Classification Result</h2>
                </div>
                
                <div id="resultCard" class="result-card">
                    <div class="result-icon">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                    <h3 id="resultTitle">Analyzing...</h3>
                    <p id="resultDescription">Please wait while we classify your email</p>
                    
                    <div id="confidenceSection" class="confidence-section hidden">
                        <div class="confidence-bar-container">
                            <div class="confidence-labels">
                                <span class="label-ham">
                                    <i class="fas fa-check-circle"></i> Legitimate
                                </span>
                                <span class="label-spam">
                                    <i class="fas fa-times-circle"></i> Spam
                                </span>
                            </div>
                            <div class="confidence-bar">
                                <div id="hamBar" class="bar ham-bar"></div>
                                <div id="spamBar" class="bar spam-bar"></div>
                            </div>
                            <div class="confidence-percentages">
                                <span id="hamPercent">0%</span>
                                <span id="spamPercent">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>
                <i class="fas fa-robot"></i> 
                Powered by Machine Learning | Built with Scikit-learn & Flask
            </p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
